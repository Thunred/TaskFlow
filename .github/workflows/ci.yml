name: CI/CD TaskFlow

on:
  push:
    branches: [main, staging]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  # Job 1 — Tests (Node 18 & 20)
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    env:
      REDIS_URL: "redis://127.0.0.1:6379"
    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env exists (copy from .env.example if missing)
        run: |
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              cp .env.example .env
              echo ".env created from .env.example"
            else
              echo "❌ .env not found and .env.example missing — aborting"
              exit 1
            fi
          else
            echo ".env exists"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Run backend tests
        run: npm --prefix backend test

      - name: Run frontend tests
        run: npm --prefix frontend test

  # Job 2 — Lint (after tests)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm ci

      - name: Run linter
        run: npm run lint

  # Job 3 — Audit (after tests)
  audit:
    name: Audit dependencies (backend)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Run npm audit (level=high) and save report
        id: npm-audit
        run: |
          set -o pipefail
          cd backend
          npm audit --audit-level=high --json > ../audit-report.json || touch ../audit.failed || true
          cd ..

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

      - name: Fail if audit found HIGH/CRITICAL
        if: always()
        run: |
          if [ -f audit.failed ]; then
            echo "🔴 npm audit detected HIGH/CRITICAL vulnerabilities"
            exit 1
          else
            echo "✅ npm audit OK (no HIGH/CRITICAL)"
          fi

  # Job 4 — Build (only on tag v*)
  build:
    name: Build, Scan & Push (tags v*)
    runs-on: ubuntu-latest
    needs: [test, lint, audit]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }} .

      - name: Run Trivy scan (JSON) and record failure if any CRITICAL
        id: trivy
        run: |
          set -o pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:latest image \
            --format json \
            --output trivy-report.json \
            --exit-code 1 \
            --severity CRITICAL \
            ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }} || touch trivy.failed || true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Fail if Trivy detected CRITICAL
        if: always()
        run: |
          if [ -f trivy.failed ]; then
            echo "🔴 Trivy detected CRITICAL CVE(s) in image"
            exit 1
          else
            echo "✅ Trivy OK (no CRITICAL CVEs)"
          fi

      - name: Docker login & push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }}

  # JOB 5 — DEPLOY STAGING