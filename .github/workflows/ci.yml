name: CI/CD TaskFlow

on:
  push:
    branches: [main, staging]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  # Job 1 — Tests (Node 18 & 20)
  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    env:
      REDIS_URL: "redis://127.0.0.1:6379"
    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env exists (copy from .env.example if missing)
        run: |
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              cp .env.example .env
              echo ".env created from .env.example"
            else
              echo "❌ .env not found and .env.example missing — aborting"
              exit 1
            fi
          else
            echo ".env exists"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend deps
        run: npm --prefix backend ci


      - name: Run backend tests
        run: npm --prefix backend test


  # Job 2 — Lint (after tests)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Run backend linter
        run: npm --prefix backend run lint

  # Job 3 — Audit (after tests)
  audit:
    name: Audit dependencies (backend)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Run npm audit (level=high) and save report
        id: npm-audit
        run: |
          set -o pipefail
          cd backend
          npm audit --audit-level=high --json > ../audit-report.json || touch ../audit.failed || true
          cd ..

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

      - name: Fail if audit found HIGH/CRITICAL
        if: always()
        run: |
          if [ -f audit.failed ]; then
            echo "🔴 npm audit detected HIGH/CRITICAL vulnerabilities"
            exit 1
          else
            echo "✅ npm audit OK (no HIGH/CRITICAL)"
          fi

  # Job 4 — Build (only on tag v*)
  build:
    name: Build, Scan & Push (tags v*)
    runs-on: ubuntu-latest
    needs: [test, lint, audit]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          docker build -f backend/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ steps.vars.outputs.tag }} backend

      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }} frontend

      - name: Run Trivy scan on backend image (JSON)
        id: trivy
        run: |
          set -o pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ghcr.io/aquasecurity/trivy:latest image \
            --format json \
            --output trivy-report-backend.json \
            --exit-code 1 \
            --severity CRITICAL \
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ steps.vars.outputs.tag }} || touch trivy.failed || true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-backend
          path: trivy-report-backend.json

      - name: Fail if Trivy detected CRITICAL
        if: always()
        run: |
          if [ -f trivy.failed ]; then
            echo "🔴 Trivy detected CRITICAL CVE(s) in backend image"
            exit 1
          else
            echo "✅ Trivy OK (no CRITICAL CVEs)"
          fi

      - name: Docker login & push images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend:${{ steps.vars.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }}

  # Job 5 — Deploy staging (push staging only)

  # Job 6 — Smoke test (after deploy staging)
  smoke-test:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    timeout-minutes: 10
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (staging)
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          mkdir -p "$HOME/.kube"
          if echo "$KUBECONFIG_CONTENT" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            echo "Decoded base64 kubeconfig for staging"
          else
            echo "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
            echo "Used raw kubeconfig for staging"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Wait for rollout and verify /health
        env:
          K8S_STAGING_NAMESPACE: ${{ vars.K8S_STAGING_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME }}
          K8S_SERVICE_NAME: ${{ vars.K8S_SERVICE_NAME }}
        run: |
          NS="${K8S_STAGING_NAMESPACE:-staging}"
          DEPLOYMENT="${K8S_DEPLOYMENT_NAME:-taskflow-backend}"
          SERVICE="${K8S_SERVICE_NAME:-taskflow-backend}"

          kubectl -n "$NS" rollout status deployment/"$DEPLOYMENT" --timeout=240s

          kubectl -n "$NS" port-forward svc/"$SERVICE" 18081:3001 >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT

          sleep 4

          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" http://127.0.0.1:18081/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test failed: /health returned HTTP $HTTP_CODE"
            cat /tmp/port-forward.log || true
            exit 1
          fi

          if ! grep -q '"status"[[:space:]]*:[[:space:]]*"ok"' /tmp/health.json; then
            echo "Smoke test failed: /health payload does not contain status: ok"
            cat /tmp/health.json || true
            exit 1
          fi

          echo "Smoke test passed"

  # Job 7 — Deploy production (tags v* only)
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (production)
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          mkdir -p "$HOME/.kube"
          if echo "$KUBECONFIG_CONTENT" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            echo "Decoded base64 kubeconfig for production"
          else
            echo "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
            echo "Used raw kubeconfig for production"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Update deployment image (production)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.ref_name }}
          K8S_PRODUCTION_NAMESPACE: ${{ vars.K8S_PRODUCTION_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME }}
          K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME }}
        run: |
          NS="${K8S_PRODUCTION_NAMESPACE:-production}"
          DEPLOYMENT="${K8S_DEPLOYMENT_NAME:-taskflow-backend}"
          CONTAINER="${K8S_CONTAINER_NAME:-backend}"
          IMAGE="${DOCKERHUB_USERNAME}/taskflow-backend:${IMAGE_TAG}"

          echo "Updating ${DEPLOYMENT}/${CONTAINER} in namespace ${NS} to ${IMAGE}"
          kubectl -n "$NS" set image deployment/"$DEPLOYMENT" "$CONTAINER"="$IMAGE"
          kubectl -n "$NS" rollout status deployment/"$DEPLOYMENT" --timeout=180s